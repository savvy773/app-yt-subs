name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build wheel
        run: uv build --wheel

      - name: Compute blake3 and generate manifest.json
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          WHEEL=$(ls dist/*.whl)
          WHEEL_NAME=$(basename "$WHEEL")
          VERSION="${TAG#v}"

          HASH=$(uv run --with blake3 --no-project python3 -c "
          import blake3, sys
          h = blake3.blake3()
          with open(sys.argv[1], 'rb') as f:
              for chunk in iter(lambda: f.read(1048576), b''):
                  h.update(chunk)
          print(h.hexdigest())
          " "$WHEEL")

          export WHEEL_NAME VERSION HASH
          python3 -c "
          import json, os
          tag  = os.environ['TAG']
          repo = os.environ['REPO']
          wheel   = os.environ['WHEEL_NAME']
          version = os.environ['VERSION']
          h       = os.environ['HASH']
          data = {
              'version': version,
              'assets': {'wheel': {
                  'url': f'https://github.com/{repo}/releases/download/{tag}/{wheel}',
                  'filename': wheel,
                  'blake3': h,
              }},
          }
          with open('manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Upload all assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=()
          files+=(dist/*.whl manifest.json)
          [[ -f scripts/install.ps1 ]] && files+=(scripts/install.ps1)
          [[ -f scripts/install.sh ]]  && files+=(scripts/install.sh)
          [[ -f images/icon.ico ]] && files+=(images/icon.ico)
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
